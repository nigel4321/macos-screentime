# fly.toml — Fly.io deployment config for the screentime backend.
#
# App name and Postgres attachment are wired separately:
#   flyctl apps create macos-screentime-backend --org personal
#   flyctl postgres attach macos-screentime-pg --app macos-screentime-backend
# Then `flyctl deploy` from this directory.

app              = "macos-screentime-backend"
primary_region   = "lhr"
kill_signal      = "SIGTERM"
kill_timeout     = "20s"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT      = "8080"
  LOG_LEVEL = "info"

[http_service]
  internal_port       = 8080
  force_https         = true
  auto_stop_machines  = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes           = ["app"]

  [[http_service.checks]]
    interval     = "15s"
    timeout      = "5s"
    grace_period = "10s"
    method       = "GET"
    path         = "/healthz"

[[vm]]
  size      = "shared-cpu-1x"
  memory    = "256mb"
  cpu_kind  = "shared"
  cpus      = 1
