version: "2"

run:
  timeout: 3m

linters:
  default: standard
  enable:
    - errcheck
    - gosec
    - govet
    - staticcheck
    - revive
    - unused
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
          - errcheck

formatters:
  enable:
    - gofmt
    - goimports
