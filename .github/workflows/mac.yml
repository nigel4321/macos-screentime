name: mac

on:
  push:
    paths:
      - "mac-agent/**"
      - ".github/workflows/mac.yml"
  pull_request:
    paths:
      - "mac-agent/**"
      - ".github/workflows/mac.yml"

concurrency:
  group: mac-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: swift build + test
    runs-on: macos-14
    defaults:
      run:
        working-directory: mac-agent

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Show toolchain versions
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      - name: Cache Swift Package Manager artifacts
        uses: actions/cache@v5
        with:
          path: |
            mac-agent/.build
            ~/Library/Caches/org.swift.swiftpm
          key: spm-v2-${{ runner.os }}-${{ hashFiles('mac-agent/Package.resolved', 'mac-agent/Package.swift') }}
          restore-keys: |
            spm-v2-${{ runner.os }}-

      # SwiftLint is attached to each target as a build-tool plugin, so
      # `swift build` lints as a side effect. A dedicated lint step is
      # intentionally not used here.
      - name: swift build
        run: swift build --configuration debug

      - name: swift test
        run: swift test --parallel

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: mac-agent/App
        run: xcodegen generate --spec project.yml

      # xcodegen 2.45 produces objectVersion 77, which Xcode 15 cannot read.
      # Switch to the latest preinstalled Xcode 16 just for the xcodebuild
      # step. swift build / swift test above use the default Xcode 15.4
      # toolchain (Swift 5.10) on purpose — Swift 6 forbids the SwiftLint
      # plugin's prebuild-from-source command, which we cannot avoid.
      - name: Select Xcode 16 for xcodebuild
        run: |
          XCODE16=$(ls -d /Applications/Xcode_16*.app | sort -V | tail -1)
          echo "Using $XCODE16"
          sudo xcode-select -s "$XCODE16"
          xcodebuild -version

      - name: xcodebuild build (MacAgent app target)
        working-directory: mac-agent/App
        run: |
          xcodebuild build \
            -project MacAgent.xcodeproj \
            -scheme MacAgent \
            -configuration Debug \
            -destination 'platform=macOS' \
            -derivedDataPath build \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            CODE_SIGNING_ALLOWED=NO

      # Zip the .app bundle so directory structure (symlinks inside Frameworks/,
      # bundle layout) survives round-tripping through upload-artifact.
      # Output is at mac-agent/App/build/Build/Products/Debug/MacAgent.app per
      # -derivedDataPath above.
      - name: Package MacAgent.app
        working-directory: mac-agent/App/build/Build/Products/Debug
        run: |
          ditto -c -k --keepParent MacAgent.app MacAgent.app.zip
          ls -lh MacAgent.app.zip

      # Debug build, ad-hoc signed (CODE_SIGNING_ALLOWED=NO above) — fine for
      # the developer to download and run locally; not a distribution build.
      # Proper codesign + notarize + .dmg is roadmap §3.9.
      - name: Upload MacAgent.app artifact
        uses: actions/upload-artifact@v7
        with:
          name: MacAgent-debug-${{ github.sha }}
          path: mac-agent/App/build/Build/Products/Debug/MacAgent.app.zip
          if-no-files-found: error
          retention-days: 14
