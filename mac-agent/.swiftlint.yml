# SwiftLint configuration for mac-agent.
# Tuned for small, TDD-driven Swift modules.

included:
  - Sources
  - Tests
  - App

excluded:
  - .build
  - .swiftpm
  - App/build       # xcodebuild's derived-data root when -derivedDataPath=build
  - App/MacAgent.xcodeproj

disabled_rules:
  - trailing_whitespace        # handled by the editor / formatter
  - todo                       # TODOs belong in ROADMAP.md, not sprinkled in code
  - identifier_name            # too opinionated by default; can be re-enabled with overrides

opt_in_rules:
  - empty_count
  - empty_string
  - empty_collection_literal
  - explicit_init
  - first_where
  - last_where
  - contains_over_first_not_nil
  - redundant_nil_coalescing
  - closure_spacing
  - sorted_imports
  - fatal_error_message
  - force_unwrapping
  - implicitly_unwrapped_optional

analyzer_rules:
  - unused_import

line_length:
  warning: 120
  error: 160
  ignores_comments: true
  ignores_urls: true

function_body_length:
  warning: 50
  error: 100

type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 500
  error: 1000

cyclomatic_complexity:
  warning: 10
  error: 20

force_unwrapping:
  severity: warning

nesting:
  type_level:
    warning: 2

reporter: "xcode"
