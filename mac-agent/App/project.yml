name: MacAgent
options:
  bundleIdPrefix: com.macagent
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  xcodeVersion: "16"

settings:
  base:
    SWIFT_VERSION: "5.9"
    ENABLE_HARDENED_RUNTIME: YES

packages:
  MacAgentCore:
    path: ../

targets:
  MacAgent:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: .
        excludes:
          - project.yml
          - MacAgent.xcodeproj
          - MacAgent.entitlements
          - build           # xcodebuild's derived-data root when -derivedDataPath=build
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.macagent.MacAgent
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        INFOPLIST_FILE: Info.plist
        CODE_SIGN_ENTITLEMENTS: MacAgent.entitlements
    dependencies:
      - package: MacAgentCore
        product: PolicyEngine
      - package: MacAgentCore
        product: LocalStore
      - package: MacAgentCore
        product: UsageCollector
      - package: MacAgentCore
        product: SyncClient
      - package: MacAgentCore
        product: AppMetadata
      - package: MacAgentCore
        product: LoginItem
    preBuildScripts:
      - name: SwiftLint
        # Runs SwiftLint over the App/ sources on every build. Uses the
        # binary that the SwiftLintBuildToolPlugin (declared in the parent
        # Package.swift) resolves into the SPM artifacts cache, so we don't
        # need a separate brew/mint install.
        script: |
          set -euo pipefail
          SWIFTLINT="${BUILD_DIR%Build/Products*}SourcePackages/artifacts/swiftlintplugins/SwiftLintBinary/SwiftLintBinary.artifactbundle/macos/swiftlint"
          if [ ! -x "$SWIFTLINT" ]; then
            echo "warning: SwiftLint binary not found at $SWIFTLINT (skipping; build the SPM package once to resolve)"
            exit 0
          fi
          "$SWIFTLINT" lint --quiet --config "${SRCROOT}/../.swiftlint.yml" "${SRCROOT}"
        basedOnDependencyAnalysis: false
    info:
      path: Info.plist
      properties:
        LSUIElement: true
        CFBundleVersion: "1"
        CFBundleShortVersionString: "0.1.0"
        NSHighResolutionCapable: true
        NSPrincipalClass: NSApplication
